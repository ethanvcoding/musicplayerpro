<script>

/* FULL SONG LIST RESTORED */
const songs = [
{title:"Without Him",artists:[{name:"Steven Curtis Chapman",link:"#"}],url:"https://res.cloudinary.com/ethanvekved-server2/video/upload/school/8/2/guitar/projects/chordsong/media/2009110/Without_Him_YTDLCH_Steven_Curtis_Chapman_Mp3_128kbps.mp3"},
{title:"Keep It Simple",artists:[{name:"Forrest Frank",link:"#"}],url:"https://res.cloudinary.com/ethanvekved-server2/video/upload/school/8/2/guitar/projects/chordsong/media/3261285/Keep_It_Simple_YTDLPY_Forrest_Frank_Mp3_128kbps.mp3"},
{title:"At The Zoo",artists:[{name:"Simon & Garfunkel",link:"#"}],url:"https://res.cloudinary.com/ethanvekved-server2/video/upload/school/8/2/guitar/projects/chordsong/media/4173552/At_The_Zoo_YTDLPY_Simon_Garfunkel_Mp3_128kbps.mp3"},
{title:"Gravity",artists:[{name:"Shawn McDonald",link:"#"}],url:"https://res.cloudinary.com/ethanvekved-server2/video/upload/school/8/2/guitar/projects/chordsong/media/4643315/Gravity_YTDLPY_Shauwn_McDonald_Mp3_128kbps.mp3"},
{title:"No Longer Bound",artists:[{name:"Forrest Frank",link:"#"}],url:"https://res.cloudinary.com/ethanvekved-server2/video/upload/school/8/2/guitar/projects/chordsong/media/5723224/No_Longer_Bound_YTDLPY_Forrest_Frank_And_Hulvey_Mp3_128kbps.mp3"},
{title:"Possibility Bells",artists:[{name:"Ryan Lott",link:"#"}],url:"https://res.cloudinary.com/ethanvekved-server2/video/upload/school/8/2/guitar/projects/chordsong/media/5787972/Possibility_Bells_YTDLPY_Ryan_Lott_Mp3_128kbps.mp3"},
{title:"Hideaway",artists:[{name:"Grace VanderWaal",link:"#"}],url:"https://res.cloudinary.com/ethanvekved-server2/video/upload/school/8/2/guitar/projects/chordsong/media/6228346/Hideaway_YTDLPY_Grace_VanderWaal_Mp3_128kbps.mp3"},
{title:"Runaway",artists:[{name:"AURORA",link:"#"}],url:"https://res.cloudinary.com/ethanvekved-server2/video/upload/school/8/2/guitar/projects/chordsong/media/7982111/Runaway_YTDLPY_Aurora_Mp3_128kbps.mp3"}
];

let queue = JSON.parse(localStorage.getItem("queue") || "[]");
let current = null;
const audio = document.getElementById("audio");

/* PLAY */
function play(i){
current = songs[i];
audio.src = current.url;
audio.play();

document.getElementById("now").innerHTML =
"Now Playing: " + current.title + " — " +
current.artists.map(a =>
`<a href="${a.link}" target="_blank">${a.name}</a>`
).join(", ");

renderSongs();
}

/* TOGGLE */
function toggle(){
audio.paused ? audio.play() : audio.pause();
}

/* NEXT */
function next(){
if(queue.length){
current = queue.shift();
audio.src = current.url;
audio.play();
saveQueue();
renderQueue();
renderSongs();
}
}

/* SEEK */
function seek(e){
const r = e.currentTarget.getBoundingClientRect();
audio.currentTime = ((e.clientX - r.left)/r.width)*audio.duration;
}

/* SAVE PROGRESS */
audio.ontimeupdate = () => {
if(!current || !audio.duration) return;

localStorage.setItem("progress_" + current.url, audio.currentTime);

document.getElementById("bar").style.width =
(audio.currentTime / audio.duration) * 100 + "%";

updateMiniBars();
};

/* MINI BARS */
function updateMiniBars(){
document.querySelectorAll(".song-progress-bar").forEach((bar,i)=>{
const s = songs[i];
const saved = localStorage.getItem("progress_" + s.url);

if(!audio.duration) return;

if(current && s.url === current.url){
bar.style.width = (audio.currentTime / audio.duration) * 100 + "%";
} else if(saved){
bar.style.width = (saved / audio.duration) * 100 + "%";
}
});
}

/* SONGS */
function renderSongs(){
const el = document.getElementById("songs");
el.innerHTML = "";

songs.forEach((s,i)=>{
el.innerHTML += `
<div class="card">

<h3>${s.title}</h3>

<div class="artist">
${s.artists.map(a=>`<a href="${a.link}" target="_blank">${a.name}</a>`).join(" · ")}
</div>

<div class="controls-row">

<button class="icon-btn" onclick="play(${i})"><span class="material-icons">play_arrow</span></button>

<button class="icon-btn" onclick="add(${i})"><span class="material-icons">add</span></button>

<button class="icon-btn" onclick="window.open('${s.url}','_blank')"><span class="material-icons">open_in_new</span></button>

<button class="icon-btn" onclick="downloadSong('${s.url}','${s.title}')"><span class="material-icons">download</span></button>

</div>

<div class="song-progress">
<div class="song-progress-bar"></div>
</div>

</div>`;
});

updateMiniBars();
}

/* DOWNLOAD */
function downloadSong(url,name){
fetch(url)
.then(r=>r.blob())
.then(blob=>{
const a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download=name+".mp3";
a.click();
});
}

/* QUEUE */
function add(i){
queue.push(songs[i]);
saveQueue();
renderQueue();
}

function saveQueue(){
localStorage.setItem("queue",JSON.stringify(queue));
}

/* DRAG AND DROP QUEUE */
let dragged = null;

function renderQueue(){
const el=document.getElementById("queue");
el.innerHTML="";

queue.forEach((s,i)=>{
el.innerHTML+=`
<div class="queue-item" draggable="true" data-i="${i}">
${s.title}
<button class="queue-btn" onclick="remove(${i})">
<span class="material-icons">close</span>
</button>
</div>`;
});

enableDrag();
}

function remove(i){
queue.splice(i,1);
saveQueue();
renderQueue();
}

/* DRAG SYSTEM FIXED */
function enableDrag(){
const items=document.querySelectorAll(".queue-item");

items.forEach(item=>{
item.addEventListener("dragstart",()=>item.classList.add("dragging"));
item.addEventListener("dragend",()=>item.classList.remove("dragging"));
});

const container=document.getElementById("queue");

container.addEventListener("dragover",e=>{
e.preventDefault();
const after=getAfter(container,e.clientY);
const dragging=document.querySelector(".dragging");

if(after==null){
container.appendChild(dragging);
} else {
container.insertBefore(dragging,after);
}
});

container.addEventListener("drop",()=>{
queue=[...document.querySelectorAll(".queue-item")].map(el=>{
return songs[el.dataset.i];
});

saveQueue();
});
}

function getAfter(container,y){
const els=[...container.querySelectorAll(".queue-item:not(.dragging)")];

return els.reduce((closest,child)=>{
const box=child.getBoundingClientRect();
const offset=y-box.top-box.height/2;
if(offset<0 && offset>closest.offset){
return {offset,element:child};
} else {
return closest;
}
},{offset:Number.NEGATIVE_INFINITY}).element;
}

/* INIT */
renderSongs();
renderQueue();

</script>
